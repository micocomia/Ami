# Global application configuration (OmegaConf)
# Default values only; no environment interpolation or API keys included.

environment: dev
debug: true
log_level: INFO

llm:
  provider: openai
  model_name: gpt-4o
  base_url: null

embedding:
  provider: huggingface
  model_name: sentence-transformers/all-mpnet-base-v2

search:
  provider: duckduckgo
  max_results: 5
  loader_type: web

vectorstore:
  persist_directory: data/vectorstore
  collection_name: non-verified-content

rag:
  chunk_size: 1000
  num_retrieval_results: 5
  allow_parallel: true
  max_workers: 3

verified_content:
  base_dir: resources/verified-course-content
  collection_name: verified_content
  chunk_size: 500
  enabled: true

server:
  host: 127.0.0.1
  port: 8000
