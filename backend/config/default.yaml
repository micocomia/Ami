# Global application configuration (OmegaConf)
# Default values only; no environment interpolation or API keys included.

environment: dev
debug: true
log_level: INFO

llm:
  provider: openai
  model_name: gpt-4o
  base_url: null

embedding:
  provider: openai
  model_name: text-embedding-3-small

search:
  provider: duckduckgo
  max_results: 5
  loader_type: web

vectorstore:
  type: azure_ai_search
  persist_directory: data/vectorstore
  collection_name: ami-web-results

azure_search:
  endpoint: ""        # overridden by AZURE_SEARCH_ENDPOINT env var
  key: ""             # overridden by AZURE_SEARCH_KEY env var
  verified_index_name: ami-verified-content

rag:
  chunk_size: 1000
  num_retrieval_results: 5
  allow_parallel: true
  max_workers: 3

verified_content:
  base_dir: resources/verified-course-content
  collection_name: verified_content
  chunk_size: 500
  enabled: true

server:
  host: 127.0.0.1
  port: 8000

prefetch:
  enabled: true
  wait_short_secs: 8
  wait_long_secs: 130
  cooldown_secs: 20
  max_workers: 2
