# Global application configuration (OmegaConf)
# Default values only; no environment interpolation or API keys included.

environment: dev
debug: true
log_level: INFO

llm:
  provider: openai
  model_name: gpt-4o
  base_url: null

embedding:
  provider: openai
  model_name: text-embedding-3-small

search:
  provider: duckduckgo
  max_results: 5
  loader_type: web

vectorstore:
  type: azure_ai_search
  collection_name: ami-web-results

blob_storage:
  connection_string: ""    # overridden by AZURE_STORAGE_CONNECTION_STRING env var
  manifests_container: ami-manifests
  audio_container: ami-audio
  diagrams_container: ami-diagrams
  course_content_container: ami-course-content  # source PDFs/PPTX for verified content indexing

azure_search:
  endpoint: ""        # overridden by AZURE_SEARCH_ENDPOINT env var
  key: ""             # overridden by AZURE_SEARCH_KEY env var
  verified_index_name: ami-verified-content

cosmos:
  database_name: ami-userdata  # connection string overridden by AZURE_COSMOS_CONNECTION_STRING env var

rag:
  chunk_size: 1000
  num_retrieval_results: 5
  allow_parallel: true
  max_workers: 3

verified_content:
  collection_name: verified_content
  chunk_size: 500
  enabled: true

server:
  host: 127.0.0.1
  port: 8000

prefetch:
  enabled: true
  wait_short_secs: 8
  wait_long_secs: 130
  cooldown_secs: 20
  max_workers: 3
  start_delay_secs: 30
